# auto48 reverse proxy.
#
# Public edge. Terminates HTTP (and TLS once a domain points at the box and
# `certbot --nginx` has run). Routes:
#   /v1, /health, /docs, /openapi.json  → FastAPI backend (127.0.0.1:8000)
#   /media/                             → MinIO object storage (127.0.0.1:9000)
#   everything else                     → Nuxt SSR frontend (127.0.0.1:3000)
#
# Upstreams are app processes deployed later; the proxy is configured now so
# the deploy step only has to start them. Replace server_name with the real
# domain, then: certbot --nginx -d auto48.ee -d www.auto48.ee
server {
    listen 80;
    listen [::]:80;
    server_name _;            # replace with auto48 domain before issuing TLS

    client_max_body_size 25m; # listing photo uploads

    # Backend API
    location ~ ^/(v1|health|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Object storage (public listing photos)
    location /media/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
    }

    # Frontend (Nuxt SSR) — catch-all
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
