# auto48 reverse proxy WITH TLS (Let's Encrypt — domain certificate for kekec.ee).
#
# Installed by deploy/obtain-cert.sh AFTER the certificate exists — referencing
# cert files that don't exist breaks `nginx -t`, so this replaces auto48.conf
# only once /etc/letsencrypt/live/kekec.ee/ is populated.
#
# Domain certs use Let's Encrypt's default ~90-day profile (the 6-day
# "shortlived" profile is only required for bare-IP certs). The certbot renew
# timer + a reload deploy-hook keep it fresh.

# Port 80: serve ACME challenges, redirect everything else to canonical HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kekec.ee www.kekec.ee 178.105.234.239 _;

    include /etc/nginx/snippets/acme.conf;

    location / {
        return 301 https://kekec.ee$request_uri;
    }
}

# Redirect www → apex over HTTPS for a single canonical host.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kekec.ee;

    ssl_certificate     /etc/letsencrypt/live/kekec.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kekec.ee/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kekec.ee$request_uri;
}

# Port 443: TLS edge (canonical host).
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name kekec.ee;

    ssl_certificate     /etc/letsencrypt/live/kekec.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kekec.ee/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m; # listing photo uploads

    # Backend API
    location ~ ^/(v1|health|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Object storage (public listing photos)
    location /media/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
    }

    # Frontend (Nuxt SSR) — catch-all
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
