services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: auto48
      POSTGRES_PASSWORD: auto48
      POSTGRES_DB: auto48
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto48 -d auto48"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: auto48
      MINIO_ROOT_PASSWORD: auto48secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 auto48 auto48secret &&
      mc mb --ignore-existing local/auto48-media &&
      mc anonymous set download local/auto48-media &&
      echo 'Bucket auto48-media ready.'
      "
    restart: on-failure

volumes:
  pgdata:
  miniodata:
